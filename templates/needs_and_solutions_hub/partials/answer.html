<div class="answer flex w-full p-2 justify-between border-m4n-neutral grid grid-cols-11 gap-2 border-b-1">
  <div class="question col-span-5 text-grey-500">
    {{answer.question.text}}
  </div>
  <div class="option col-span-5">
    {{answer.option.text}}
  </div>
  <div class="text-right">
    <form method="post">
      {% csrf_token %}
      {{ wizard.management_form }}
      <button type="submit" name="wizard_goto_step" value="{{ answer.step_name }}" class="underline hover:no-underline">
        Change
      </button>
    </form>
  </div>
</div>
