{% extends "base_page.html" %}

{% block content %}
<div class="needs-and-solutions-hub wizard-result">
  <h1>{{ page.title }} — Results</h1>

  <div class="answers">
    {% for answer in result.answers %}
        {% include "needs_and_solutions_hub/partials/answer.html" %}
    {% endfor %}
  </div>

  <a href="{{ page.url }}" class="btn">Start Again</a>

  <div class="pt-7 results mb-7">
    <p>{{ result.summary }}</p>
  </div>

</div>
{% endblock %}
