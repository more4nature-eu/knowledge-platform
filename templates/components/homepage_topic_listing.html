{% load wagtailcore_tags wagtailimages_tags static %}
<div class="mb-10">
  <div class="mb-5 flex justify-between items-baseline">
    <div>
      <h3 class="font-serif4 text-4xl font-bold mb-0"><a href="{% pageurl page %}" class="hover:underline">{{page.title}}</a></h3>
    </div>
    <div>
      <a class="font-serif4 text-2xl font-bold hover:underline" href="{% pageurl page %}">More ></a>
    </div>
  </div>
  <div class="grid grid-cols-3 gap-5">
    {% for article in page.articles|slice:":3" %}
      {% include "components/card.html" with page=article %}
    {% endfor %}
  </div>
</div>
